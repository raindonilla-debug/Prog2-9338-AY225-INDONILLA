<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #08e6e6a4;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            width: 480px;
            margin-bottom: 20px;
        }
        h2 { text-align: center; color: #2d3436; margin-top: 0; }
        
        .form-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 15px;
            align-items: center;
        }
        label { font-weight: 600; color: #444; }
        input {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }
        input[readonly] { background-color: #f8f9fa; color: #0984e3; font-weight: bold; }

        .sig-container {
            grid-column: 1 / span 2;
            margin-top: 10px;
        }
        canvas {
            border: 2px dashed #00b4d8;
            border-radius: 8px;
            background: #fafafa;
            cursor: crosshair;
            width: 100%;
            height: 150px;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        #deleteBtn { background: #ff7675; color: white; flex: 1; }
        #deleteBtn:hover { background: #d63031; }
        
        #enterBtn { background: #00b4d8; color: white; flex: 2; }
        #enterBtn:hover { background: #0077b6; }

        /* History Table Styling */
        .history-container {
            background: white;
            width: 90%;
            max-width: 800px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #f8f9fa; color: #444; }
        .sig-preview {
            max-height: 40px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Attendance Tracker</h2>
    
    <div class="form-grid">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter Full Name">

        <label for="course">Course/Year:</label>
        <input type="text" id="course" placeholder="e.g. BSIT 2-A">

        <label for="timeIn">Running Time:</label>
        <input type="text" id="timeIn" readonly>

        <div class="sig-container">
            <label>Draw E-Signature:</label>
            <canvas id="sigCanvas"></canvas>
            <div class="controls">
                <button type="button" id="deleteBtn">Delete Signature</button>
                <button type="button" id="enterBtn">Enter Attendance</button>
            </div>
        </div>
    </div>
</div>

<div class="history-container">
    <h3>Attendance History</h3>
    <table id="historyTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Course/Year</th>
                <th>Time In</th>
                <th>Signature</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script src="script.js"></script>

</body>
</html>
